# =============================================
# CarLogix Backend Configuration
# =============================================

spring.application.name=carlogix-backend

# PostgreSQL
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:carlogix}
spring.datasource.username=${DB_USERNAME:carlogix}
spring.datasource.password=${DB_PASSWORD:carlogix}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway (schema migrations)
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# JWT
carlogix.jwt.secret=${JWT_SECRET:change-me-in-production-this-must-be-at-least-256-bits-long-for-hs256}
carlogix.jwt.expiration-ms=86400000

# OBD2 SQLite database path (from MCP server)
carlogix.obd2.database-path=${OBD2_DB_PATH:./obd2_codes.db}

# Server
server.port=${SERVER_PORT:8080}

# CORS
carlogix.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# Logging
logging.level.com.carlogix=DEBUG
logging.level.org.springframework.security=INFO
