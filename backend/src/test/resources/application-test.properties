# Test profile — uses H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

spring.flyway.enabled=false

carlogix.jwt.secret=test-secret-key-that-must-be-at-least-256-bits-long-for-hs512-signing-algorithm-aaaa
carlogix.jwt.expiration-ms=3600000

carlogix.obd2.database-path=./test-obd2.db
carlogix.cors.allowed-origins=http://localhost:5173
