services:
  carlogix-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: carlogix-dev
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8080
    stdin_open: true
    tty: true
    networks:
      - carlogix-network

networks:
  carlogix-network:
    driver: bridge
