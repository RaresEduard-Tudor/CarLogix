version: '3.8'

services:
  # CarLogix Web Application
  carlogix-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Firebase configuration - load from .env file
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
        VITE_FIREBASE_MEASUREMENT_ID: ${VITE_FIREBASE_MEASUREMENT_ID}
        VITE_USE_FIREBASE_EMULATORS: ${VITE_USE_FIREBASE_EMULATORS:-false}
        VITE_USE_FIREBASE_PROD: ${VITE_USE_FIREBASE_PROD:-false}
    container_name: carlogix-web
    ports:
      - "3000:80"
    restart: "no"  # Changed from unless-stopped to prevent auto-start
    networks:
      - carlogix-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Development service (optional - for live development with hot reload)
  carlogix-dev:
    image: node:20-alpine
    container_name: carlogix-dev
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_FIREBASE_API_KEY=${VITE_FIREBASE_API_KEY}
      - VITE_FIREBASE_AUTH_DOMAIN=${VITE_FIREBASE_AUTH_DOMAIN}
      - VITE_FIREBASE_PROJECT_ID=${VITE_FIREBASE_PROJECT_ID}
      - VITE_FIREBASE_STORAGE_BUCKET=${VITE_FIREBASE_STORAGE_BUCKET}
      - VITE_FIREBASE_MESSAGING_SENDER_ID=${VITE_FIREBASE_MESSAGING_SENDER_ID}
      - VITE_FIREBASE_APP_ID=${VITE_FIREBASE_APP_ID}
      - VITE_FIREBASE_MEASUREMENT_ID=${VITE_FIREBASE_MEASUREMENT_ID}
      - VITE_USE_FIREBASE_EMULATORS=${VITE_USE_FIREBASE_EMULATORS:-false}
      - VITE_USE_FIREBASE_PROD=${VITE_USE_FIREBASE_PROD:-false}
    command: sh -c "yarn install && yarn dev --host 0.0.0.0"
    networks:
      - carlogix-network
    profiles:
      - dev

networks:
  carlogix-network:
    driver: bridge
