services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: carlogix-db
    environment:
      POSTGRES_DB: carlogix
      POSTGRES_USER: carlogix
      POSTGRES_PASSWORD: ${DB_PASSWORD:-carlogix}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/db/migration/V1__initial_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/src/main/resources/db/migration/V2__maintenance_records.sql:/docker-entrypoint-initdb.d/02-maintenance.sql
    networks:
      - carlogix-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carlogix"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot Backend
  carlogix-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: carlogix-api
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: carlogix
      DB_USERNAME: carlogix
      DB_PASSWORD: ${DB_PASSWORD:-carlogix}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-this-must-be-at-least-256-bits-long-for-hs256}
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
      OBD2_DB_PATH: /data/obd2_codes.db
    volumes:
      - ./obd2_codes.db:/data/obd2_codes.db:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - carlogix-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 30s

  # CarLogix Web Application
  carlogix-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    container_name: carlogix-web
    ports:
      - "3000:80"
    depends_on:
      carlogix-api:
        condition: service_healthy
    networks:
      - carlogix-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Development frontend (hot reload)
  carlogix-dev:
    image: node:20-alpine
    container_name: carlogix-dev
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8080
    command: sh -c "yarn install && yarn dev --host 0.0.0.0"
    depends_on:
      carlogix-api:
        condition: service_healthy
    networks:
      - carlogix-network
    profiles:
      - dev

volumes:
  postgres_data:

networks:
  carlogix-network:
    driver: bridge
